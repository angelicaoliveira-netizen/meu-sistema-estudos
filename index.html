<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Estudos</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1e1e1e;
    color: #fff;
}

.sidebar {
    width: 250px;
    height: 100vh;
    background: #2a2a2a;
    position: fixed;
    padding: 15px;
}

.menu-item {
    margin: 10px 0;
    cursor: pointer;
}

.submenu {
    margin-left: 15px;
    display: none;
}

.content {
    margin-left: 260px;
    padding: 20px;
}

.card {
    background: #2f2f2f;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

input {
    margin: 5px;
    padding: 8px;
}

button {
    padding: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>Estudos</h2>

    <div class="menu-item" onclick="toggleMenu()">Concursos ▸</div>
    <div class="submenu" id="submenu">
        <div class="menu-item" onclick="trocar('petrobras')">Petrobras</div>
        <div class="menu-item" onclick="trocar('fazenda')">Ministério da Fazenda</div>
        <div class="menu-item" onclick="trocar('receita')">Receita Federal</div>
    </div>

    <div class="menu-item" onclick="abrir('dashboard')">Dashboard</div>
    <div class="menu-item" onclick="abrir('agenda')">Agenda</div>
    <div class="menu-item" onclick="abrir('disciplinas')">Disciplinas</div>
</div>

<div class="content" id="conteudo"></div>

<script>

let dados = {
    petrobras: { horas: 0, estudos: [], agenda: [], disciplinas: [] },
    fazenda: { horas: 0, estudos: [], agenda: [], disciplinas: [] },
    receita: { horas: 0, estudos: [], agenda: [], disciplinas: [] }
};

let atual = "petrobras";
let tela = "dashboard";

function trocar(nome){
    atual = nome;
    render();
}

function abrir(t){
    tela = t;
    render();
}

function render(){
    let c = document.getElementById("conteudo");
    let d = dados[atual];

    if(tela === "dashboard"){
        c.innerHTML = `
        <h1>${atual}</h1>

        <div class="card">
            <input id="disciplina" placeholder="Disciplina">
            <input id="tempo" type="number" placeholder="Horas">
            <button onclick="salvarEstudo()">Salvar</button>
        </div>

        <div class="card">
            <p>Horas: ${d.horas}</p>
            <p>${d.estudos.join(", ")}</p>
        </div>
        `;
    }

    if(tela === "agenda"){
        c.innerHTML = `
        <h1>Agenda</h1>

        <div class="card">
            <input id="tarefa" placeholder="Tarefa">
            <button onclick="addTarefa()">Adicionar</button>
        </div>

        <div class="card">
            ${d.agenda.join("<br>")}
        </div>
        `;
    }

    if(tela === "disciplinas"){
        c.innerHTML = `
        <h1>Disciplinas</h1>

        <div class="card">
            <input id="novaDisc" placeholder="Nova disciplina">
            <button onclick="addDisciplina()">Adicionar</button>
        </div>

        <div class="card">
            ${d.disciplinas.join("<br>")}
        </div>
        `;
    }
}

function salvarEstudo(){
    let disc = document.getElementById("disciplina").value;
    let tempo = Number(document.getElementById("tempo").value);

    if(!disc || !tempo) return alert("Preencha");

    let d = dados[atual];
    d.horas += tempo;
    d.estudos.push(disc + " - " + tempo + "h");

    render();
}

function addTarefa(){
    let t = document.getElementById("tarefa").value;
    if(!t) return;

    dados[atual].agenda.push(t);
    render();
}

function addDisciplina(){
    let d = document.getElementById("novaDisc").value;
    if(!d) return;

    dados[atual].disciplinas.push(d);
    render();
}

function toggleMenu(){
    let m = document.getElementById("submenu");
    m.style.display = m.style.display === "block" ? "none" : "block";
}

render();

</script>

</body>
</html>
