<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Estudos</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1e1e1e;
    color: #fff;
}

.sidebar {
    width: 250px;
    height: 100vh;
    background: #2a2a2a;
    position: fixed;
    padding: 15px;
}

.menu-item {
    margin: 10px 0;
    cursor: pointer;
}

.submenu {
    margin-left: 15px;
    display: none;
}

.content {
    margin-left: 260px;
    padding: 20px;
}

.card {
    background: #2f2f2f;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

input {
    margin: 5px;
    padding: 8px;
}

button {
    padding: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>Estudos</h2>

    <div class="menu-item" onclick="toggleMenu()">Concursos ▸</div>
    <div class="submenu" id="submenu">
        <div class="menu-item" onclick="trocar('petrobras')">Petrobras</div>
        <div class="menu-item" onclick="trocar('fazenda')">Ministério da Fazenda</div>
        <div class="menu-item" onclick="trocar('receita')">Receita Federal</div>
    </div>

    <div class="menu-item" onclick="abrir('dashboard')">Dashboard</div>
    <div class="menu-item" onclick="abrir('agenda')">Agenda</div>
    <div class="menu-item" onclick="abrir('disciplinas')">Disciplinas</div>
    <div class="menu-item" onclick="abrir('historico')">Histórico</div>
</div>

<div class="content" id="conteudo"></div>

<script>

// 🔥 DADOS COM CICLO
let dados = JSON.parse(localStorage.getItem("dados")) || {
    concursoAtual: "petrobras",
    concursos: {
        petrobras: { horas: 0, estudos: [], agenda: [], disciplinas: [], ciclo: [], posicao: 0 },
        fazenda: { horas: 0, estudos: [], agenda: [], disciplinas: [], ciclo: [], posicao: 0 },
        receita: { horas: 0, estudos: [], agenda: [], disciplinas: [], ciclo: [], posicao: 0 }
    }
};

let tela = "dashboard";

function salvar() {
    localStorage.setItem("dados", JSON.stringify(dados));
}

function trocar(nome) {
    dados.concursoAtual = nome;
    salvar();
    render();
}

function abrir(t) {
    tela = t;
    render();
}

function render() {
    let c = document.getElementById("conteudo");
    let atual = dados.concursos[dados.concursoAtual];

    // 🔥 SUGESTÃO AUTOMÁTICA
    let sugestao = "Cadastre disciplinas";

    if (atual.ciclo.length > 0) {
        sugestao = atual.ciclo[atual.posicao];
    }

    if (tela === "dashboard") {
        c.innerHTML = `
        <h1>${dados.concursoAtual}</h1>

        <div class="card">
            <h3>📅 Estudar agora</h3>
            <p>${sugestao}</p>
        </div>

        <div class="card">
            <input id="disciplina" placeholder="Disciplina">
            <input id="tempo" type="number" placeholder="Horas">
            <button onclick="salvarEstudo()">Salvar</button>
        </div>

        <div class="card">
            <p>Horas: ${atual.horas}</p>
            <p>${atual.estudos.slice(-5).join("<br>")}</p>
        </div>
        `;
    }

    if (tela === "agenda") {
        c.innerHTML = `
        <h1>Agenda</h1>

        <div class="card">
            <input id="tarefa" placeholder="Nova tarefa">
            <button onclick="addTarefa()">Adicionar</button>
        </div>

        <div class="card">
            ${atual.agenda.join("<br>")}
        </div>
        `;
    }

    if (tela === "disciplinas") {
        c.innerHTML = `
        <h1>Disciplinas</h1>

        <div class="card">
            <input id="novaDisc" placeholder="Nova disciplina">
            <button onclick="addDisciplina()">Adicionar</button>
        </div>

        <div class="card">
            ${atual.disciplinas.join("<br>")}
        </div>
        `;
    }

    if (tela === "historico") {
        c.innerHTML = `
        <h1>Histórico</h1>
        <div class="card">
            ${atual.estudos.join("<br>")}
        </div>
        `;
    }
}

function salvarEstudo() {
    let d = document.getElementById("disciplina").value;
    let t = Number(document.getElementById("tempo").value);

    if (!d || !t) return alert("Preencha");

    let atual = dados.concursos[dados.concursoAtual];

    atual.horas += t;
    atual.estudos.push(d + " - " + t + "h");

    // 🔥 GIRAR CICLO
    if (atual.ciclo.length > 0) {
        atual.posicao++;
        if (atual.posicao >= atual.ciclo.length) {
            atual.posicao = 0;
        }
    }

    salvar();
    render();
}

function addTarefa() {
    let t = document.getElementById("tarefa").value;
    if (!t) return;

    dados.concursos[dados.concursoAtual].agenda.push(t);
    salvar();
    render();
}

function addDisciplina() {
    let d = document.getElementById("novaDisc").value;
    if (!d) return;

    let atual = dados.concursos[dados.concursoAtual];

    atual.disciplinas.push(d);
    atual.ciclo.push(d); // 🔥 entra no ciclo automático

    salvar();
    render();
}

function toggleMenu() {
    let m = document.getElementById("submenu");
    m.style.display = m.style.display === "block" ? "none" : "block";
}

render();

</script>

</body>
</html>
