<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Meu Sistema de Estudos</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1e1e1e;
    color: #fff;
}

.sidebar {
    width: 250px;
    height: 100vh;
    background: #2a2a2a;
    position: fixed;
    padding: 15px;
}

.menu-item {
    margin: 10px 0;
    cursor: pointer;
}

.submenu {
    margin-left: 15px;
    display: none;
}

.content {
    margin-left: 260px;
    padding: 20px;
}

.card {
    background: #2f2f2f;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>Estudos</h2>

    <div class="menu-item" onclick="toggleMenu()">Concursos ▸</div>
    <div class="submenu" id="submenu">
        <div class="menu-item" onclick="trocarConcurso('petrobras')">Petrobras</div>
        <div class="menu-item" onclick="trocarConcurso('fazenda')">Ministério da Fazenda</div>
        <div class="menu-item" onclick="trocarConcurso('receita')">Receita Federal</div>
    </div>
</div>

<div class="content">
    <h1 id="titulo">Petrobras</h1>

    <div class="card">
        <input id="disciplina" placeholder="Disciplina">
        <input id="tempo" placeholder="Horas">
        <button onclick="salvarEstudo()">Salvar</button>
    </div>

    <div class="card">
        <p id="progresso"></p>
        <p id="tarefas"></p>
    </div>
</div>

<script>

// 🔥 dados simples e garantidos
let dados = {
    petrobras: { total: 0, tarefas: [] },
    fazenda: { total: 0, tarefas: [] },
    receita: { total: 0, tarefas: [] }
};

let atual = "petrobras";

function salvarEstudo() {
    let d = document.getElementById("disciplina").value;
    let t = Number(document.getElementById("tempo").value);

    if (!d || !t) return alert("Preencha");

    dados[atual].total += t;
    dados[atual].tarefas.push(d + " - " + t + "h");

    atualizar();
}

function trocarConcurso(nome) {
    atual = nome;
    atualizar();
}

function atualizar() {
    document.getElementById("titulo").innerText = atual;

    document.getElementById("progresso").innerText =
        "Horas: " + dados[atual].total;

    document.getElementById("tarefas").innerText =
        dados[atual].tarefas.join(", ");
}

function toggleMenu() {
    let m = document.getElementById("submenu");
    m.style.display = m.style.display === "block" ? "none" : "block";
}

atualizar();

</script>

</body>
</html>
