<script>

// 🔥 CORREÇÃO AUTOMÁTICA DE DADOS ANTIGOS
let dadosAntigos = JSON.parse(localStorage.getItem("dados"));

if (!dadosAntigos || !dadosAntigos.concursos) {
    dadosAntigos = {
        concursoAtual: "petrobras",
        concursos: {
            petrobras: { totalHoras: 0, tarefas: [] },
            fazenda: { totalHoras: 0, tarefas: [] },
            receita: { totalHoras: 0, tarefas: [] }
        }
    };
}

let dados = dadosAntigos;

function salvar() {
    localStorage.setItem("dados", JSON.stringify(dados));
}

function nomeConcurso(nome) {
    return {
        petrobras: "Petrobras",
        fazenda: "Ministério da Fazenda",
        receita: "Receita Federal"
    }[nome];
}

function trocarConcurso(nome) {
    dados.concursoAtual = nome;
    salvar();
    atualizar();
}

function salvarEstudo() {
    let disciplina = document.getElementById("disciplina").value;
    let tempo = Number(document.getElementById("tempo").value);

    if (!disciplina || !tempo) return alert("Preencha tudo");

    let atual = dados.concursos[dados.concursoAtual];

    atual.totalHoras += tempo;
    atual.tarefas.push({ disciplina, tempo });

    salvar();
    atualizar();

    document.getElementById("disciplina").value = "";
    document.getElementById("tempo").value = "";
}

function atualizar() {
    let atual = dados.concursos[dados.concursoAtual];

    document.getElementById("titulo").innerText =
        nomeConcurso(dados.concursoAtual);

    document.getElementById("progresso").innerText =
        atual.totalHoras + " horas estudadas";

    if (atual.tarefas.length === 0) {
        document.getElementById("tarefas").innerText =
            "Nenhuma tarefa ainda";
    } else {
        document.getElementById("tarefas").innerText =
            atual.tarefas.map(t => t.disciplina + " - " + t.tempo + "h").join(", ");
    }
}

function toggleMenu() {
    let menu = document.getElementById("submenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function exportar() {
    let blob = new Blob([JSON.stringify(dados)], {type: "application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "backup_estudos.json";
    a.click();
}

function importar(event) {
    let file = event.target.files[0];
    let reader = new FileReader();

    reader.onload = function() {
        dados = JSON.parse(reader.result);
        salvar();
        atualizar();
    };

    reader.readAsText(file);
}

atualizar();

</script>
