<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Meu Sistema de Estudos</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #1a1a1a;
  color: #e4e4e4;
  display: flex;
}

/* MENU LATERAL */
.sidebar {
  width: 220px;
  background-color: #111;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 20px;
}

.sidebar a {
  display: block;
  padding: 10px;
  margin-bottom: 10px;
  text-decoration: none;
  color: #ccc;
  border-radius: 8px;
}

.sidebar a:hover {
  background-color: #333;
}

/* CONTEÚDO */
.main {
  flex: 1;
  padding: 20px;
}

.header {
  font-size: 22px;
  margin-bottom: 20px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background-color: #2a2a2a;
  padding: 20px;
  border-radius: 12px;
}

.card h3 {
  margin: 0 0 10px;
}

.big {
  font-size: 28px;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>📚 Estudos</h2>
  <a href="#">Dashboard</a>
  <a href="#">Disciplinas</a>
  <a href="#">Edital</a>
  <a href="#">Ciclo de Estudos</a>
  <a href="#">Questões</a>
  <a href="#">Simulados</a>
  <a href="#">Estatísticas</a>
</div>

<div class="main">

  <div class="header">Dashboard</div>

  <div class="grid">

    <div class="card">
      <h3>Horas hoje</h3>
      <div class="big">0h</div>
    </div>

    <div class="card">
      <h3>Meta diária</h3>
      <div class="big">5h</div>
    </div>

    <div class="card">
      <h3>Hoje estudar</h3>
      <p>Direito Constitucional<br>Português<br>Informática</p>
    </div>

    <div class="card">
      <h3>Revisões</h3>
      <p>Penal (1 dia)<br>Matemática (7 dias)</p>
    </div>

  </div>

</div>

</body>
</html>
