<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Estudos</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1e1e1e;
    color: #fff;
}

.sidebar {
    width: 250px;
    height: 100vh;
    background: #2a2a2a;
    position: fixed;
    padding: 15px;
}

.menu-item {
    margin: 10px 0;
    cursor: pointer;
}

.submenu {
    margin-left: 15px;
    display: none;
}

.content {
    margin-left: 260px;
    padding: 20px;
}

.card {
    background: #2f2f2f;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>Estudos</h2>

    <div class="menu-item" onclick="toggleMenu()">Concursos ▸</div>
    <div class="submenu" id="submenu">
        <div class="menu-item" onclick="trocarConcurso('petrobras')">Petrobras</div>
        <div class="menu-item" onclick="trocarConcurso('fazenda')">Ministério da Fazenda</div>
        <div class="menu-item" onclick="trocarConcurso('receita')">Receita Federal</div>
    </div>

    <div class="menu-item" onclick="abrirTela('dashboard')">Dashboard</div>
    <div class="menu-item" onclick="abrirTela('agenda')">Agenda</div>
    <div class="menu-item" onclick="abrirTela('disciplinas')">Disciplinas</div>
    <div class="menu-item" onclick="abrirTela('estatisticas')">Estatísticas</div>
</div>

<div class="content" id="conteudo"></div>

<script>

// 🔥 dados simples
let dados = {
    petrobras: { horas: 0, lista: [] },
    fazenda: { horas: 0, lista: [] },
    receita: { horas: 0, lista: [] }
};

let atual = "petrobras";
let telaAtual = "dashboard";

// 🔹 trocar concurso
function trocarConcurso(nome) {
    atual = nome;
    render();
}

// 🔹 trocar tela
function abrirTela(tela) {
    telaAtual = tela;
    render();
}

// 🔹 renderizar tela
function render() {
    let html = "";

    if (telaAtual === "dashboard") {
        html = `
            <h1>${nomeBonito(atual)}</h1>

            <div class="card">
                <h3>Registrar estudo</h3>
                <input id="disciplina" placeholder="Disciplina">
                <input id="tempo" type="number" placeholder="Horas">
                <button onclick="salvar()">Salvar</button>
            </div>

            <div class="card">
                <h3>Progresso</h3>
                <p>Horas: ${dados[atual].horas}</p>
            </div>

            <div class="card">
                <h3>Estudos realizados</h3>
                <p>${dados[atual].lista.join(", ")}</p>
            </div>
        `;
    }

    if (telaAtual === "agenda") {
        html = `<h1>Agenda</h1><p>(em breve)</p>`;
    }

    if (telaAtual === "disciplinas") {
        html = `<h1>Disciplinas</h1><p>(em breve)</p>`;
    }

    if (telaAtual === "estatisticas") {
        html = `<h1>Estatísticas</h1><p>(em breve)</p>`;
    }

    document.getElementById("conteudo").innerHTML = html;
}

// 🔹 salvar estudo
function salvar() {
    let d = document.getElementById("disciplina").value;
    let t = Number(document.getElementById("tempo").value);

    if (!d || !t) {
        alert("Preencha tudo");
        return;
    }

    dados[atual].horas += t;
    dados[atual].lista.push(d + " - " + t + "h");

    render();
}

// 🔹 nome bonito
function nomeBonito(nome) {
    return {
        petrobras: "Petrobras",
        fazenda: "Ministério da Fazenda",
        receita: "Receita Federal"
    }[nome];
}

// 🔹 menu
function toggleMenu() {
    let m = document.getElementById("submenu");
    m.style.display = m.style.display === "block" ? "none" : "block";
}

// 🔥 iniciar
render();

</script>

</body>
</html>
