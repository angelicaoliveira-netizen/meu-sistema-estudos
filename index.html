<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Estudos</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1e1e1e;
    color: white;
}

.sidebar {
    width: 250px;
    height: 100vh;
    background: #2a2a2a;
    position: fixed;
    padding: 15px;
}

.menu-item {
    margin: 10px 0;
    cursor: pointer;
}

.submenu {
    margin-left: 15px;
    display: none;
}

.content {
    margin-left: 260px;
    padding: 20px;
}

.card {
    background: #2f2f2f;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

input {
    margin: 5px;
    padding: 5px;
}

button {
    padding: 5px 10px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>Estudos</h2>

    <div class="menu-item" onclick="toggleMenu()">Concursos ▸</div>
    <div class="submenu" id="submenu">
        <div class="menu-item" onclick="trocar('petrobras')">Petrobras</div>
        <div class="menu-item" onclick="trocar('fazenda')">Ministério da Fazenda</div>
        <div class="menu-item" onclick="trocar('receita')">Receita Federal</div>
    </div>
</div>

<div class="content">
    <h1 id="titulo">Petrobras</h1>

    <div class="card">
        <input id="disciplina" placeholder="Disciplina">
        <input id="tempo" placeholder="Horas">
        <button onclick="salvar()">Salvar</button>
    </div>

    <div class="card">
        <p id="progresso">Horas: 0</p>
        <p id="lista"></p>
    </div>
</div>

<script>

// 🔥 Estrutura correta e simples
let dados = {
    petrobras: { horas: 0, lista: [] },
    fazenda: { horas: 0, lista: [] },
    receita: { horas: 0, lista: [] }
};

let atual = "petrobras";

// 🔹 Trocar concurso
function trocar(nome) {
    atual = nome;
    atualizar();
}

// 🔹 Salvar estudo
function salvar() {
    let d = document.getElementById("disciplina").value;
    let t = Number(document.getElementById("tempo").value);

    if (!d || !t) {
        alert("Preencha tudo");
        return;
    }

    dados[atual].horas += t;
    dados[atual].lista.push(d + " - " + t + "h");

    atualizar();

    document.getElementById("disciplina").value = "";
    document.getElementById("tempo").value = "";
}

// 🔹 Atualizar tela
function atualizar() {
    document.getElementById("titulo").innerText = atual;

    document.getElementById("progresso").innerText =
        "Horas: " + dados[atual].horas;

    document.getElementById("lista").innerText =
        dados[atual].lista.join(", ");
}

// 🔹 Menu
function toggleMenu() {
    let m = document.getElementById("submenu");
    m.style.display = m.style.display === "block" ? "none" : "block";
}

atualizar();

</script>

</body>
</html>
