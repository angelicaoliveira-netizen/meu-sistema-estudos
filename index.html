
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meu Sistema de Estudos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #1e1e1e;
      color: #e0e0e0;
    }

    header {
      padding: 20px;
      text-align: center;
      background-color: #2a2a2a;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: #2f2f2f;
      padding: 20px;
      border-radius: 12px;
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .highlight {
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }

    .button {
      display: block;
      margin-top: 10px;
      padding: 10px;
      text-align: center;
      background-color: #444;
      border-radius: 8px;
      text-decoration: none;
      color: white;
    }

    .button:hover {
      background-color: #666;
    }
  </style>
</head>

<body>

<header>
  📚 Meu Sistema de Estudos
</header>

<div class="container">

  <div class="card">
    <h2>📊 Progresso de Hoje</h2>
    <div class="highlight">0h</div>
  </div>

  <div class="card">
    <h2>🎯 Meta do Dia</h2>
    <div class="highlight">5h</div>
  </div>

  <div class="card">
    <h2>📅 Hoje vou estudar</h2>
    <p>• Direito Constitucional<br>• Português<br>• Informática</p>
  </div>

  <div class="card">
    <h2>🔁 Próximas Revisões</h2>
    <p>• Direito Penal (1 dia)<br>• Matemática (7 dias)</p>
  </div>

  <div class="card">
    <h2>🚀 Acessar módulos</h2>
    <a class="button" href="#">Disciplinas</a>
    <a class="button" href="#">Questões</a>
    <a class="button" href="#">Simulados</a>
  </div>

</div>

</body>
</html>
